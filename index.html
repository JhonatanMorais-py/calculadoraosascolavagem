<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de Lavagem Profissional</title>

    <style>
        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: #0f0f0f;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .card {
            background-color: #1a1a1a;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.7);
            width: 380px;
            border-left: 5px solid #00ff88;
        }

        h2 {
            text-align: center;
            color: #00ff88;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .input-group { margin-bottom: 20px; }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.85rem;
            color: #888;
        }

        input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333;
            background-color: #252525;
            color: #00ff88;
            font-size: 1.1rem;
            box-sizing: border-box;
        }

        textarea {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #333;
            background-color: #111;
            color: #00ff88;
            font-size: 0.9rem;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            background: #00ff88;
            color: #000;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }

        .divider {
            border-top: 1px dashed #444;
            margin: 20px 0;
        }

        .row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 12px;
            font-size: 1rem;
        }

        .label-res { color: #bbb; }
        .val-res { font-weight: bold; }

        .cliente-destaque {
            color: #00ff88;
            font-size: 1.3rem;
            border-bottom: 1px solid #00ff88;
        }

        .sintonia-val { color: #ff4444; }
        .lucro-val { color: #00d4ff; }
    </style>
</head>

<body>

<div class="card">
    <h2>Lavagem & Lucro</h2>

    <div class="input-group">
        <label>VALOR TOTAL (SUJO):</label>
        <input type="number" id="valorTotal" placeholder="Ex: 400000" oninput="calcular()">
    </div>

    <div class="input-group">
        <label>TAXA COBRADA DO CLIENTE (%):</label>
        <input type="number" id="taxaCliente" placeholder="Ex: 30" oninput="calcular()">
    </div>

    <div class="divider"></div>

    <div class="row">
        <span class="label-res">ENTREGAR AO CLIENTE:</span>
        <span id="entregaCliente" class="val-res cliente-destaque">R$ 0,00</span>
    </div>

    <div class="row" style="margin-top: 20px;">
        <span class="label-res">SEU LUCRO BRUTO:</span>
        <span id="lucroBruto" class="val-res">R$ 0,00</span>
    </div>

    <div class="row">
        <span class="label-res">SINTONIA (20% DO LUCRO):</span>
        <span id="pagoSintonia" class="val-res sintonia-val">R$ 0,00</span>
    </div>

    <div class="divider"></div>

    <div class="row">
        <span class="label-res">SEU LUCRO LÍQUIDO:</span>
        <span id="lucroFinal" class="val-res lucro-val">R$ 0,00</span>
    </div>

    <div class="divider"></div>

    <div class="input-group">
        <label>RESULTADO PARA WHATSAPP:</label>
        <textarea id="resultadoTexto" rows="7" readonly></textarea>
    </div>

    <button onclick="copiarTexto()">COPIAR RESULTADO</button>
</div>

<script>
function calcular() {
    const totalSujo = parseFloat(document.getElementById('valorTotal').value) || 0;
    const taxaCli = parseFloat(document.getElementById('taxaCliente').value) || 0;

    const lucroBruto = totalSujo * (taxaCli / 100);
    const entregaCliente = totalSujo - lucroBruto;
    const pagoSintonia = lucroBruto * 0.20;
    const lucroLiquido = lucroBruto - pagoSintonia;

    const money = (v) => v.toLocaleString('pt-br', {style: 'currency', currency: 'BRL'});

    document.getElementById('entregaCliente').innerText = money(entregaCliente);
    document.getElementById('lucroBruto').innerText = money(lucroBruto);
    document.getElementById('pagoSintonia').innerText = money(pagoSintonia);
    document.getElementById('lucroFinal').innerText = money(lucroLiquido);

    // TEXTO PARA WHATSAPP
    const texto = `💰 *RELATÓRIO DE LAVAGEM*

💵 Valor recebido: ${money(totalSujo)}
📊 Taxa aplicada: ${taxaCli}%

👤 Valor entregue ao cliente: ${money(entregaCliente)}

📈 Lucro bruto: ${money(lucroBruto)}
🏢 Sintonia (20%): ${money(pagoSintonia)}

✅ Lucro líquido: ${money(lucroLiquido)}`;

    document.getElementById('resultadoTexto').value = texto;
}

function copiarTexto() {
    const texto = document.getElementById('resultadoTexto');
    texto.select();
    document.execCommand('copy');
    alert("Copiado para o WhatsApp!");
}
</script>

</body>
</html>
